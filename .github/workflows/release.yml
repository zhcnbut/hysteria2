name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'hy2.sh'
      - 'install.sh'
      - 'lib/hy2/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'scripts/verify.sh'
      - 'scripts/check-menu-sync.sh'
      - 'scripts/check-version-sync.sh'
      - 'scripts/smoke-e2e.sh'
      - 'scripts/measure-memory.sh'
      - 'tests/**'
      - '.github/workflows/release.yml'
  workflow_dispatch: # 手动触发按钮

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ⚠️关键修复：必须拉取完整历史，否则获取不到之前的 Tag

      - name: Extract Version
        id: get_version
        run: |
          # 从 hy2.sh 中提取 sh_ver 变量的值
          VERSION=$(sed -n 's/^sh_ver="\(v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)".*/\1/p' hy2.sh | head -n 1 || echo "")
          
          if [ -z "$VERSION" ]; then
            echo "❌ 致命错误：无法在 hy2.sh 中找到 sh_ver 变量！请确保代码中有 sh_ver=\"v1.0.0\" 这样的定义。"
            exit 1
          fi
          
          echo "成功提取到版本号: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Install verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Make verify scripts executable
        run: chmod +x scripts/verify.sh scripts/check-menu-sync.sh scripts/check-version-sync.sh scripts/smoke-e2e.sh scripts/measure-memory.sh tests/e2e/config-flow.sh

      - name: Run bash syntax checks
        run: ./scripts/verify.sh syntax

      - name: Run shellcheck
        run: ./scripts/verify.sh shellcheck

      - name: Check menu sync
        run: ./scripts/verify.sh menu-sync

      - name: Check version sync
        run: ./scripts/verify.sh version-sync

      - name: Run smoke E2E
        run: ./scripts/verify.sh smoke-e2e

      - name: Run bats tests
        run: ./scripts/verify.sh bats

      - name: Run config flow replay
        run: ./scripts/verify.sh config-flow

      - name: Check if Release is Needed
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Release ${{ env.VERSION }} already exists. Skipping."
            echo "should_release=false" >> $GITHUB_ENV
          else
            if [ "${{ env.VERSION }}" == "${{ env.LATEST_TAG }}" ]; then
              echo "Tag ${{ env.VERSION }} already exists, but release is missing. Creating release."
            else
              echo "New version ${{ env.VERSION }} detected. Creating release."
            fi
            echo "should_release=true" >> $GITHUB_ENV
          fi

      - name: Package Code
        if: env.should_release == 'true'
        run: |
          tar --exclude=".git" --exclude=".github" -zcvf ../code.tar.gz .
          mv ../code.tar.gz ./

      - name: Generate Checksums
        if: env.should_release == 'true'
        run: |
          sha256sum code.tar.gz hy2.sh install.sh lib/hy2/*.sh > SHA256SUMS

      - name: Build Release Notes
        if: env.should_release == 'true'
        run: |
          {
            echo "## 主要变化"
            echo
            awk -v version="${VERSION}" '
              $0 == "## " version || index($0, "## " version " - ") == 1 {
                in_section = 1
                next
              }
              in_section && /^## / {
                exit
              }
              in_section {
                print
              }
            ' CHANGELOG.md | sed '/^[[:space:]]*$/d'
          } > RELEASE_BODY.md

          if [ "$(wc -l < RELEASE_BODY.md)" -le 2 ]; then
            echo "- 本版本暂无详细说明。" >> RELEASE_BODY.md
          fi

      - name: Create Release
        if: env.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            code.tar.gz
            hy2.sh
            install.sh
            lib/hy2/*.sh
            SHA256SUMS
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: RELEASE_BODY.md
