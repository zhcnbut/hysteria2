name: Lint

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'hy2.sh'
      - 'install.sh'
      - 'lib/hy2/**'
      - 'scripts/verify.sh'
      - 'scripts/check-menu-sync.sh'
      - 'scripts/check-version-sync.sh'
      - 'scripts/smoke-e2e.sh'
      - 'scripts/measure-memory.sh'
      - 'tests/**'
      - '.github/workflows/lint.yml'

jobs:
  verify-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Make verify script executable
        run: chmod +x scripts/verify.sh scripts/check-menu-sync.sh scripts/check-version-sync.sh scripts/smoke-e2e.sh scripts/measure-memory.sh tests/e2e/config-flow.sh

      - name: Run bash syntax checks
        run: ./scripts/verify.sh syntax

      - name: Run shellcheck
        run: ./scripts/verify.sh shellcheck

      - name: Check menu sync
        run: ./scripts/verify.sh menu-sync

      - name: Check version sync
        run: ./scripts/verify.sh version-sync

      - name: Run smoke E2E
        run: ./scripts/verify.sh smoke-e2e

      - name: Run bats tests
        run: ./scripts/verify.sh bats

      - name: Run config flow replay
        run: ./scripts/verify.sh config-flow

  verify-debian:
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y bash shellcheck bats grep sed gawk coreutils

      - name: Make verify script executable
        run: chmod +x scripts/verify.sh scripts/check-menu-sync.sh scripts/check-version-sync.sh scripts/smoke-e2e.sh scripts/measure-memory.sh tests/e2e/config-flow.sh

      - name: Run bash syntax checks
        run: ./scripts/verify.sh syntax

      - name: Run shellcheck
        run: ./scripts/verify.sh shellcheck

      - name: Check menu sync
        run: ./scripts/verify.sh menu-sync

      - name: Check version sync
        run: ./scripts/verify.sh version-sync

      - name: Run smoke E2E
        run: ./scripts/verify.sh smoke-e2e

      - name: Run bats tests
        run: ./scripts/verify.sh bats

      - name: Run config flow replay
        run: ./scripts/verify.sh config-flow
